# =============================================================================
# IDS-RS - Fisier de Configurare
# =============================================================================
# Formatul TOML: https://toml.io/
# =============================================================================

[network]
# Adresa IP pe care asculta serverul UDP. "0.0.0.0" = toate interfetele.
listen_address = "0.0.0.0"
# Portul UDP pe care se primesc log-urile de la firewall.
listen_port = 5555
# Tipul de parser activ: "gaia" (Checkpoint Gaia Raw), "cef" (ArcSight CEF),
# sau "gaia_cef" (Checkpoint Gaia LEA blob in CEF Name — via ArcSight).
parser = "gaia_cef"
# Mod debug: afiseaza fiecare pachet primit cu validare parsare.
# debug = true
# Rate limiting UDP: protejeaza CPU-ul impotriva flood-ului de pachete.
# udp_rate_limit = pachete acceptate per secunda (0 = dezactivat).
# udp_burst_size = capacitate burst (permite varfuri scurte legitime).
udp_rate_limit = 10000
udp_burst_size = 20000

# Mapping static IP → hostname (optional).
# Folosit pentru afisare in alerte CLI, email si SIEM (shost=/dhost= in CEF).
# Reteaua fiind izolata si fara DNS, hostname-urile sunt configurate manual.
[network.hostnames]
# "10.0.1.10" = "srv-dc01"
# "10.0.1.20" = "srv-mail"
# "10.0.2.50" = "ws-admin01"

# Mapping static subnet CIDR → locatie fizica (optional).
# Folosit pentru afisare in alerte CLI, email si SIEM — ofera context fizic
# (etaj, cladire, zona) pe langa IP si hostname.
# Suportă subnete imbricate: se aplica cel mai specific match (longest prefix).
# Exemplu: /16 pentru cladire, /24 pentru etaj.
[network.subnets]
# "10.10.1.0/24" = "Etaj 1"
# "10.10.2.0/24" = "Etaj 2"
# "10.10.3.0/24" = "Etaj 3"
# "10.10.0.0/24" = "Server Room"
# "10.10.0.0/16" = "Cladire Principala"

# -----------------------------------------------------------------------------
# Praguri de detectie pentru scanari de retea
# -----------------------------------------------------------------------------

[detection]
# Perioada de cooldown (secunde) intre alerte repetate pentru acelasi IP.
# Previne spam-ul de alerte cand un atac este deja detectat.
alert_cooldown_secs = 300

# Maxim port-hit-uri tinute in memorie per IP sursa.
# Un scanner de porturi la viteza mare poate genera mii de hit-uri intre doua
# cleanup cycle-uri. Fara aceasta limita, un singur IP rau-intentionat ar putea
# consuma sute de MB de RAM. La 10.000 intrari x ~24 bytes = ~240 KB per IP.
max_hits_per_ip = 10000

# Maxim IP-uri urmarite simultan in memorie.
# Fara aceasta limita, un atacator care spoofs milioane de IP-uri sursa diferite
# ar putea umple RAM-ul serverului. Cand se atinge limita, IP-ul cel mai vechi
# (LRU — Least Recently Used) este eliminat pentru a face loc celui nou.
max_tracked_ips = 100000

# IP-uri si subretele excluse din detectie (trafic legitim cunoscut).
# Accepta IP-uri individuale si CIDR. Aceste IP-uri nu genereaza alerte.
# Exemplu: servere care comunica normal pe zeci de porturi (AD, mail, etc.)
whitelist = [
    # "10.0.1.10",       # srv-dc01 (AD — DNS, Kerberos, LDAP, SMB)
    # "10.0.1.20",       # srv-mail (SMTP, IMAP, POP3)
    # "10.0.2.0/24",     # subnet management
]

[detection.fast_scan]
# Numar de porturi unice care declanseaza alerta de Fast Scan.
# Alerta se emite cand un IP acceseaza >= port_threshold porturi unice
# in time_window_secs secunde.
port_threshold = 15
time_window_secs = 10

[detection.slow_scan]
# Numar de porturi unice care declanseaza alerta de Slow Scan.
# Alerta se emite cand un IP acceseaza >= port_threshold porturi unice
# in time_window_mins minute.
port_threshold = 30
time_window_mins = 5

[detection.accept_scan]
# Numar de porturi unice ACCEPTATE (permise de firewall) care declanseaza
# alerta de Accept Scan. Alerta se emite cand un IP acceseaza >= port_threshold
# porturi DESCHISE in time_window_secs secunde.
# Accept Scan detecteaza enumerarea serviciilor active (open port enumeration).
# Pragul este mai mic decat Fast Scan (traficul accept poate fi mai "normal").
port_threshold = 5
time_window_secs = 30

[detection.lateral_movement]
# Detectie Lateral Movement (#22): un IP contacteaza N destinatii diferite
# pe conexiuni acceptate (orice port). Pattern tipic de propagare in retea
# compromisa. Detectia e bazata pe comportament, nu pe port specific.
# Servicii legitime cu fan-out mare (backup, monitoring) se pun in whitelist.
enabled = false
# Numar de destinatii unice care declanseaza alerta.
unique_dest_threshold = 5
# Fereastra de timp in secunde in care se numara destinatiile.
time_window_secs = 60

[detection.distributed_scan]
# Detectie Distributed Scan (#23): N surse diferite scanează aceeasi tinta
# in aceeasi fereastra de timp. Perspectiva inversata — detectia se face
# din perspectiva TINTEI, nu a atacatorului.
# Pattern tipic de botnet sau atac coordonat: mai multi atacatori scanează
# simultan acelasi server/serviciu.
# Detecteaza atat evenimente drop cat si accept.
enabled = false
# Numar de surse unice care declanseaza alerta.
unique_sources_threshold = 5
# Fereastra de timp in secunde in care se numara sursele.
time_window_secs = 60

# -----------------------------------------------------------------------------
# Configurare alerte
# -----------------------------------------------------------------------------

[alerting.siem]
# Trimite alerte catre SIEM (ArcSight) prin UDP syslog.
enabled = true
host = "127.0.0.1"
port = 514

[alerting.email]
# Trimite alerte prin email catre echipa IT/Security.
enabled = true
smtp_server = "smtp.example.com"
smtp_port = 25
smtp_tls = false
from = "ids-rs@example.com"
to = ["it-security@example.com"]
username = ""
password = ""
# Footer personalizabil pentru email-urile de alerta.
# Poate contine banner ASCII al echipei, disclaimer, etc.
# Folositi """ pentru text multi-linie in TOML.
email_footer = """
   ____  ____  ____  ____       _       ____
  / ___|| ___|| __ )|___ \\     / \\     |  _ \\
  \\___ \\|___ \\|  _ \\  __) |   / _ \\    | | | |
   ___) |___) | |_) |/ __/   / ___ \\ _ | |_| |
  |____/|____/|____/|_____| /_/   \\_(_)|____/

  Generat automat de S5B2 A.D."""

# -----------------------------------------------------------------------------
# Mentenanta memorie
# -----------------------------------------------------------------------------

[cleanup]
# Intervalul (secunde) la care ruleaza task-ul de cleanup.
interval_secs = 60
# Varsta maxima (secunde) a inregistrarilor din memorie. Dupa acest interval,
# datele de port-hit pentru un IP sunt sterse, eliberand memoria.
max_entry_age_secs = 600
